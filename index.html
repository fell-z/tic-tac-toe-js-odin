<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
    <title>Tic Tac Toe</title>
  </head>
  <body>
    <div class="controls">
      <div>
        <label>
          Player one's name:
          <input type="text" name="playerOneName" value="Player One" autocomplete="name">
        </label>
        <label>
          Player two's name:
          <input type="text" name="playerTwoName" value="Player Two" autocomplete="name">
        </label>
      </div>

      <button type="button" id="new-game-btn">New game</button>
    </div>

    <div class="board disabled">
    </div>

    <output>
    </output>
  </body>
</html>
